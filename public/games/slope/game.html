<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Slope</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
    }
    #gameContainer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
<div class="webgl-content">
  <div id="gameContainer" style="width: 100vw; height: 100vh;"></div>
</div>

<script>
  const BASE = "https://cdn.jsdelivr.net/gh/cgolden15/Slope-Game@main/";

  function loadScript(src, onload) {
    const s = document.createElement('script');
    s.src = src;
    s.onload = onload;
    s.onerror = () => console.error('Failed to load: ' + src);
    document.head.appendChild(s);
  }

  function loadCSS(href) {
    const l = document.createElement('link');
    l.rel = 'stylesheet';
    l.href = href;
    document.head.appendChild(l);
  }

  loadCSS(BASE + "TemplateData/style.css");

  loadScript(BASE + "TemplateData/UnityProgress.js", function() {
    loadScript(BASE + "TemplateData/unityloader41.js", function() {
      var gameInstance = UnityLoader.instantiate(
        "gameContainer",
        BASE + "Build/slope.json",
        {
          onProgress: UnityProgress,
          Module: {
            onRuntimeInitialized: function() {
              UnityProgress(gameInstance, "complete");
            }
          }
        }
      );
    });
  });
</script>
<script>document.addEventListener('keydown',function(e){try{window.parent.postMessage({type:'keydown',key:e.key,ctrlKey:e.ctrlKey,shiftKey:e.shiftKey,altKey:e.altKey},'*')}catch(e){}});</script>
</body>
</html>
